version: "3.9"

services:
  database_skillio:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin_skillio
      POSTGRES_PASSWORD: m3TFDKicG40ftJ1zY6rZTQpIbEw3sV9lqVYPwsAJTn1Qa3ujuxx6QeBQqQBy4oaN
      POSTGRES_DB: activities_db
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - db_final_reset_v9:/var/lib/postgresql/data
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:YOnWXWdCRPRG3dQQ@db.hulqbgfllkxjfnmgjupq.supabase.co:5432/postgres
    depends_on:
      - database_skillio
    networks:
      - internal
      - coolify
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`api.skillio.live`)
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls=true
      - traefik.http.routers.backend.tls.certresolver=letsencrypt
      - traefik.http.services.backend.loadbalancer.server.port=8000

  # Frontend moved to Vercel - skillio.live served by Vercel, not Coolify

volumes:
  db_final_reset_v9:

networks:
  internal:
    driver: bridge
  coolify:
    external: true